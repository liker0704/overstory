# Overstory configuration
# See: https://github.com/overstory/overstory

project:
  name: overstory
  root: /home/liker/projects/os-eco/overstory
  canonicalBranch: main
  qualityGates:
    - name: Tests
      command: bun test
      description: all tests must pass
    - name: Lint
      command: bun run lint
      description: zero errors
    - name: Typecheck
      command: bun run typecheck
      description: no TypeScript errors
agents:
  manifestPath: .overstory/agent-manifest.json
  baseDir: .overstory/agent-defs
  maxConcurrent: 25
  staggerDelayMs: 2000
  maxDepth: 3
  maxSessionsPerRun: 0
  maxAgentsPerLead: 5
worktrees:
  baseDir: .overstory/worktrees
taskTracker:
  backend: github
  enabled: true
mulch:
  enabled: true
  domains: []
  primeFormat: markdown
merge:
  aiResolveEnabled: true
  reimagineEnabled: false
providers:
  anthropic:
    type: native
watchdog:
  tier0Enabled: true
  tier0IntervalMs: 30000
  tier1Enabled: false
  tier2Enabled: false
  staleThresholdMs: 300000
  zombieThresholdMs: 600000
  nudgeIntervalMs: 60000
mission:
  maxConcurrent: 3
  planReview:
    enabled: true
  cleanup:
    purgeSessionTranscripts: true
coordinator:
  exitTriggers:
    allAgentsDone: false
    taskTrackerEmpty: false
    onShutdownSignal: false
models:
  reviewer: opus
  plan-devil-advocate: opus
  plan-security-critic: opus
  plan-performance-critic: opus
  plan-second-opinion: opus
  plan-simulator: opus
  tester: opus
  plan-architecture-critic: opus
logging:
  verbose: false
  redactSecrets: true
runtime:
  default: claude
  shellInitDelayMs: 0
  pi:
    provider: anthropic
    modelMap:
      opus: anthropic/claude-opus-4-6
      sonnet: anthropic/claude-sonnet-4-6
      haiku: anthropic/claude-haiku-4-5
rateLimit:
  enabled: true
  behavior: wait
  maxWaitMs: 3600000
  pollIntervalMs: 30000
  notifyCoordinator: true
  swapRuntime: null
