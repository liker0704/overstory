description: "Merge smoke: 2 builders write overlapping changes, merge queue drains with no content loss"
timeout_ms: 600000

config_overrides:
  agents:
    maxConcurrent: 4

startup_actions:
  - command: sd create --title "Append line A to shared.txt" --type task --priority 2
    description: "First task modifying shared file"
  - command: sd create --title "Append line B to shared.txt" --type task --priority 2
    description: "Second task modifying shared file"
